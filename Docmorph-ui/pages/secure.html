<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="../css/main.css">

<title>Rotate PDF</title>

</head>

<body class="rotate">

<script src="../js/theme.js"></script>
<script src="../components/navbar.js"></script>
<script src="../js/app.js"></script>


<div class="center-card">

<div class="big-icon">
<i class="fas fa-rotate-right"></i>
</div>

<div class="title">Rotate PDF Pages</div>

<div class="subtitle">
Rotate pages in your PDF with precision
</div>


<!-- Upload Box -->

<div class="upload-box">
<i class="fas fa-cloud-arrow-up"
style="font-size:32px; margin-bottom:12px; display:block; color:#6366f1;"></i>
Drag & Drop PDF file here or click to browse
</div>

<input type="file" accept=".pdf" id="fileInput">


<!-- Rotation Selection -->

<label style="margin-top:20px; display:block;">
Select Rotation
</label>

<select id="rotationSelect">
<option disabled selected>Select rotation angle</option>
<option value="90cw">90° Clockwise</option>
<option value="90ccw">90° Counter-Clockwise</option>
<option value="180">180°</option>
</select>


<button class="gradient-btn" style="margin-top:25px;">
<i class="fas fa-check"></i> Rotate PDF
</button>

</div>


<div class="footer">
DocMorph — Secure, Fast & Privacy-Focused
</div>

</body>
</html>
