<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="../css/main.css">

<title>Merge PDFs</title>

</head>

<body class="merge">

<!-- JS -->
<script src="../js/theme.js"></script>
<script src="../components/navbar.js"></script>
<script src="../js/app.js"></script>


<div class="center-card">

<div class="big-icon">
<i class="fas fa-object-group"></i>
</div>

<div class="title">Merge PDF Files</div>

<div class="subtitle">
Combine multiple PDFs into one seamless document
</div>


<!-- Upload Box -->

<div class="upload-box">
<i class="fas fa-cloud-arrow-up"
style="font-size:32px; margin-bottom:12px; display:block; color:#3b82f6;"></i>

Drag & Drop files here or click to browse
</div>

<input type="file" multiple accept=".pdf">


<button class="gradient-btn" style="margin-top:20px;">
<i class="fas fa-check"></i> Merge PDFs
</button>

</div>


<!-- Footer -->

<div class="footer">
DocMorph — Secure, Fast & Privacy-Focused
</div>


</body>
</html>
