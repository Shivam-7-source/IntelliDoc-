<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="../css/main.css">

<title>Split PDFs</title>

</head>

<body class="split">

<script src="../js/theme.js"></script>
<script src="../components/navbar.js"></script>
<script src="../js/app.js"></script>


<div class="center-card">

<div class="big-icon">
<i class="fas fa-scissors"></i>
</div>

<div class="title">Split PDF File</div>

<div class="subtitle">
Extract specific pages from your document with ease
</div>


<!-- Upload -->

<div class="upload-box">
<i class="fas fa-cloud-arrow-up"
style="font-size:32px; margin-bottom:12px; display:block; color:#10b981;"></i>

Drag & Drop PDF file here or click to browse
</div>

<input type="file" accept=".pdf" id="fileInput">


<!-- Page Range -->

<label style="margin-top:20px; display:block;">
Page Range (optional)
</label>

<input type="text"
placeholder="e.g. 1-5, 8, 10-12"
style="margin-top:8px;"
id="pageRangeInput">


<button class="gradient-btn" style="margin-top:25px;">
<i class="fas fa-check"></i> Split PDF
</button>

</div>


<div class="footer">
DocMorph — Secure, Fast & Privacy-Focused
</div>

</body>
</html>
