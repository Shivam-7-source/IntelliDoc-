<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="../css/main.css">

<title>Convert Files</title>
</head>

<body class="convert">

<!-- JS -->
<script src="../js/theme.js"></script>
<script src="../components/navbar.js"></script>
<script src="../js/app.js"></script>

<div class="center-card">

<div class="big-icon">
<i class="fas fa-right-left"></i>
</div>

<div class="title">Convert Files</div>

<div class="subtitle">
Convert PDF into different formats instantly
</div>

<!-- Upload Box -->

<div class="upload-box">
<i class="fas fa-cloud-arrow-up"
style="font-size:32px; margin-bottom:12px; display:block; color:#06b6d4;"></i>

Drag & Drop file here or click to browse
</div>

<input type="file" accept=".pdf,.doc,.docx,.txt">

<label style="margin-top:15px; display:block;">Convert To</label>

<select>
<option>PDF to Word</option>
<option>PDF to Text</option>
<option>Word to PDF</option>
<option>Text to PDF</option>
</select>

<button class="gradient-btn" style="margin-top:20px;">
<i class="fas fa-check"></i> Convert File
</button>

</div>

<div class="footer">
DocMorph — Secure, Fast & Privacy-Focused
</div>

</body>
</html>
