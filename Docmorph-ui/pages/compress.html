<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="../css/main.css">

<title>Compress PDF</title>

</head>

<body class="compress">

<!-- JS -->
<script src="../js/theme.js"></script>
<script src="../components/navbar.js"></script>
<script src="../js/app.js"></script>


<div class="center-card">

<div class="big-icon">
<i class="fas fa-compress"></i>
</div>

<div class="title">Compress PDF</div>

<div class="subtitle">
Reduce file size while maintaining quality
</div>


<!-- Upload Box -->

<div class="upload-box">

<i class="fas fa-cloud-arrow-up"
style="font-size:32px; margin-bottom:12px; display:block; color:#f59e0b;"></i>

Drag & Drop PDF file here or click to browse

</div>


<input type="file" accept=".pdf">


<button class="gradient-btn">
<i class="fas fa-check"></i> Compress PDF
</button>

</div>


<!-- Footer -->

<div class="footer">
DocMorph — Secure, Fast & Privacy-Focused
</div>


</body>
</html>
