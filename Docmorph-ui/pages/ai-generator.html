<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../css/main.css">

<title>AI PDF Generator</title>
</head>

<body class="ai">

<!-- JS -->
<script src="../js/theme.js"></script>
<script src="../components/navbar.js"></script>
<script src="../js/app.js"></script>

<div class="center-card">

<div class="big-icon">✨</div>

<div class="title">AI PDF Generator</div>

<div class="subtitle">
Generate professional content with AI and convert it into a clean PDF.
</div>

<!-- STEP 1 -->

<label><b>Step 1: Enter your topic or prompt</b></label>

<textarea rows="5"
placeholder="e.g., Write a professional cover letter for a Software Engineer position..."></textarea>

<button class="gradient-btn">
⚡ Generate with AI
</button>

<!-- STEP 2 -->

<label style="margin-top:30px;"><b>Step 2: Paste AI-generated content</b></label>

<textarea rows="7"
placeholder="Paste the content generated by AI here..."></textarea>

<button class="gradient-btn">
📄 Convert to PDF
</button>

<!-- INFO BOX -->

<div class="info-box">
⚠️ AI-generated content may require verification.  
This tool converts your text into a professional PDF layout.
</div>

</div>

<div class="footer">
DocMorph — Secure, Fast, and Privacy-Focused
</div>

</body>
</html>
