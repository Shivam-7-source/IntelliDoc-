<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="../css/main.css">

<title>Share Files</title>

</head>

<body class="share">

<script src="../js/theme.js"></script>
<script src="../components/navbar.js"></script>
<script src="../js/app.js"></script>


<div class="center-card">

<div class="big-icon">
<i class="fas fa-share-nodes"></i>
</div>

<div class="title">Share Files & Text</div>

<div class="subtitle">
Generate a temporary link & secure access code
</div>


<!-- Upload -->

<div class="upload-box">
<i class="fas fa-cloud-arrow-up"
style="font-size:32px; margin-bottom:12px; display:block; color:#10b981;"></i>

Drag & Drop file here or click to browse
</div>

<input type="file" id="fileInput">


<button class="gradient-btn" style="margin-top:20px;">
<i class="fas fa-link"></i> Generate Share Link
</button>

</div>


<div class="footer">
DocMorph — Secure, Fast & Privacy-Focused
</div>

</body>
</html>
