<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="../css/main.css">

<title>Paraphrase Tool</title>

</head>

<body class="paraphrase">

<!-- JS -->
<script src="../js/theme.js"></script>
<script src="../components/navbar.js"></script>
<script src="../js/app.js"></script>


<div class="center-card">

<div class="big-icon">❝</div>

<div class="title">AI Paraphrasing Tool</div>

<div class="subtitle">
Rewrite text using AI with tone and length control
</div>


<!-- Textarea -->

<textarea rows="8"
placeholder="Paste or type the text you want to paraphrase here..."></textarea>


<label style="margin-top:20px; display:block;">
Select tone
</label>


<!-- Tone Buttons -->

<div class="tone-container">

<div class="tone">Standard</div>
<div class="tone">Fluency</div>
<div class="tone">Humanize</div>
<div class="tone">Formal</div>
<div class="tone">Academic</div>
<div class="tone">Simple</div>
<div class="tone">Creative</div>
<div class="tone">Expand</div>
<div class="tone">Shorten</div>

</div>


<button class="gradient-btn" style="margin-top:20px;">
🔁 Paraphrase
</button>

</div>


<!-- Footer OUTSIDE card -->

<div class="footer">
Privacy: Text is processed in memory only.
</div>


</body>
</html>
